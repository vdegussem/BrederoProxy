<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrederoUnblocked - Proxy Search</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        .container { 
            text-align: center; 
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 { 
            color: #00d1ff; 
            font-size: 48px;
            margin-bottom: 20px; 
            letter-spacing: -1px;
        }

        .url-input {
            width: 650px; 
            max-width: 90%; 
            padding: 18px 30px; 
            border-radius: 50px; 
            border: 1px solid #444; 
            background: #222; 
            color: white; 
            font-size: 18px; 
            outline: none; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .url-input:focus { 
            border-color: #00d1ff; 
            background: #2a2a2a; 
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.25);
        }

        .btn-group { 
            margin-top: 30px; 
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .go-btn {
            padding: 14px 35px; 
            background: #00d1ff; 
            color: black; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 209, 255, 0.2);
        }

        .go-btn.secondary {
            background: #333;
            color: #00d1ff;
            border: 1px solid #00d1ff;
        }

        .go-btn:hover { 
            background: #00b8e6; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 209, 255, 0.3);
        }

        .go-btn.secondary:hover {
            background: #444;
        }

        .quick-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .quick-links a {
            transition: transform 0.2s;
            display: inline-block;
        }

        .quick-links a:hover {
            transform: scale(1.15);
        }

        .quick-links img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        
        .status-msg { 
            font-size: 13px; 
            color: #777; 
            margin-top: 40px; 
        }

        a { color: #00d1ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BrederoUnblocked</h1>
        
        <input type="text" id="siteUrl" class="url-input" placeholder="Zoek of typ een URL..." autofocus>
        
        <div class="btn-group">
            <button class="go-btn" onclick="loadSite(false)">Proxy Zoeken</button>
            <button class="go-btn secondary" onclick="loadSite(true)">Cloak Tab</button>
        </div>

        <div class="quick-links">
            <a href="javascript:void(0)" onclick="quickLoad('https://youtube.com')">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/042/127/234/small/white-square-bordered-youtube-logo-on-transparent-background-free-png.png" alt="YouTube">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://wikipedia.org')">
                <img src="https://1000logos.net/wp-content/uploads/2021/11/Wikipedia-Logo-20031.png" alt="Wikipedia">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://discord.com')">
                <img src="https://static.vecteezy.com/system/resources/previews/018/930/718/non_2x/discord-logo-discord-icon-transparent-free-png.png" alt="Discord">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://www.tiktok.com/')">
                <img src="https://www.freepnglogos.com/uploads/tik-tok-logo-png/tik-tok-how-use-tiktok-create-cool-videos-with-iphone-14.png" alt="TikTok">
            </a>
            <a href="javascript:void(0)" onclick="quickLoad('https://instagram.com')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1280px-Instagram_logo_2016.svg.png" alt="Instagram">
            </a>
        </div>

        <div class="status-msg">
            Tip: Werkt het niet? Bezoek eerst 
            <a href="https://webtopper-1.onrender.com/" target="_blank">deze link</a> 
            om de server te wekken.
        </div>
    </div>

    <script>
        const proxyBase = "https://webtopper-1.onrender.com/";

        function cloak(url) {
            const win = window.open();
            if (!win || win.closed) {
                alert("Pop-up geblokkeerd! Sta pop-ups toe voor cloaking.");
                return;
            }
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            const iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.margin = '0';
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }

        function loadSite(shouldCloak) {
            let input = document.getElementById('siteUrl').value.trim();

            if (input) {
                let targetUrl = "";
                const isUrl = input.includes('.') && !input.includes(' ');

                if (isUrl) {
                    targetUrl = input.startsWith('http') ? input : 'https://' + input;
                } else {
                    targetUrl = 'https://google.com' + encodeURIComponent(input);
                }
                
                const finalUrl = proxyBase + targetUrl;

                if (shouldCloak) {
                    cloak(finalUrl);
                } else {
                    window.location.href = finalUrl;
                }
            } else {
                alert("Typ eerst iets in!");
            }
        }

        function quickLoad(url) {
            window.location.href = proxyBase + url;
        }

        document.getElementById('siteUrl').addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                loadSite(false);
            }
        });
    </script>

</body>
</html>
