<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">BrederoUnblocked - Proxy Search</title>
    <link id="tab-icon" rel="icon" type="image/png" href="https://google.com">
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        .container { 
            text-align: center; 
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 { 
            color: #00d1ff; 
            font-size: 48px;
            margin-bottom: 20px; 
            letter-spacing: -1px;
        }

        .url-input {
            width: 650px; 
            max-width: 90%; 
            padding: 18px 30px; 
            border-radius: 50px; 
            border: 1px solid #444; 
            background: #222; 
            color: white; 
            font-size: 18px; 
            outline: none; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .url-input:focus { 
            border-color: #00d1ff; 
            background: #2a2a2a; 
            box-shadow: 0 0 20px rgba(0, 209, 255, 0.25);
        }

        .btn-group { 
            margin-top: 30px; 
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .go-btn {
            padding: 14px 35px; 
            background: #00d1ff; 
            color: black; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 209, 255, 0.2);
        }

        .go-btn.cloak {
            background: #ff9800;
            color: white;
        }

        .go-btn:hover { 
            background: #00b8e6; 
            transform: translateY(-2px);
        }

        .quick-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .quick-links img {
            width: 48px; height: 48px;
            border-radius: 10px;
            object-fit: cover;
            transition: 0.2s;
        }

        .quick-links a:hover img { transform: scale(1.15); }
        
        .status-msg { font-size: 13px; color: #777; margin-top: 40px; }
        a { color: #00d1ff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BrederoUnblocked</h1>
        
        <input type="text" id="siteUrl" class="url-input" placeholder="Zoek of typ een URL..." autofocus>
        
        <div class="btn-group">
            <button class="go-btn" onclick="loadSite()">Proxy Zoeken</button>
            <button class="go-btn cloak" onclick="applyCloak()">Camouflage Tab</button>
        </div>

        <div class="quick-links">
            <a href="javascript:void(0)" onclick="quickLoad('https://youtube.com')"><img src="https://vecteezy.com" alt=""></a>
            <a href="javascript:void(0)" onclick="quickLoad('https://wikipedia.org')"><img src="https://1000logos.net" alt=""></a>
            <a href="javascript:void(0)" onclick="quickLoad('https://discord.com')"><img src="https://vecteezy.com" alt=""></a>
            <a href="javascript:void(0)" onclick="quickLoad('https://tiktok.com')"><img src="https://freepnglogos.com" alt=""></a>
            <a href="javascript:void(0)" onclick="quickLoad('https://instagram.com')"><img src="https://wikimedia.org" alt=""></a>
        </div>

        <div class="status-msg">
            Tip: Werkt het niet? Bezoek eerst <a href="https://onrender.com" target="_blank">deze link</a>.
        </div>
    </div>

    <script>
        const proxyBase = "https://onrender.com";

        // De Camouflage functie
        function applyCloak() {
            // Pas de titel aan
            document.title = "Mijn Bestanden - Google Drive";
            
            // Pas de favicon aan
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon';
            link.rel = 'shortcut icon';
            link.href = 'https://gstatic.com';
            document.getElementsByTagName('head')[0].appendChild(link);
            
            alert("Tab is nu gecamoufleerd als Google Drive!");
        }

        function loadSite() {
            let input = document.getElementById('siteUrl').value.trim();
            if (input) {
                let targetUrl = "";
                const isUrl = input.includes('.') && !input.includes(' ');
                if (isUrl) {
                    targetUrl = input.startsWith('http') ? input : 'https://' + input;
                } else {
                    targetUrl = 'https://google.com' + encodeURIComponent(input);
                }
                window.location.href = proxyBase + targetUrl;
            } else {
                alert("Typ eerst iets in!");
            }
        }

        function quickLoad(url) {
            window.location.href = proxyBase + url;
        }

        document.getElementById('siteUrl').addEventListener("keypress", function(e) {
            if (e.key === "Enter") loadSite();
        });
    </script>
</body>
</html>
