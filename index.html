<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrederoUnblocked</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="https://google.com">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #1a1a1a; }
        
        #home {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; color: white; text-align: center;
        }

        .container { background: #333; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00d1ff; margin-bottom: 10px; }
        
        .url-input {
            width: 350px; padding: 15px; border-radius: 25px; border: 2px solid #444; 
            background: #222; color: white; font-size: 16px; outline: none;
        }

        .go-btn {
            margin-top: 25px; padding: 15px 40px; background: #00d1ff; color: black; 
            border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="home">
        <div class="container">
            <h1>BrederoUnblocked</h1>
            <p>Voer een URL in:</p>
            <input type="text" id="siteUrl" class="url-input" placeholder="bijv. wikipedia.org" autofocus>
            <br>
            <button class="go-btn" onclick="loadSite()">Open via Proxy (Cloaked)</button>
        </div>
    </div>

    <script>
        function loadSite() {
            let input = document.getElementById('siteUrl').value.trim();
            // JOUW CORRECTE PROXY URL MET SLASH
            let proxyUrl = "https://onrender.com"; 

            if (input) {
                let targetUrl = input;
                if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
                
                let finalUrl = proxyUrl + targetUrl;

                // --- ABOUT:BLANK CLOAKING LOGIC ---
                let newWin = window.open('about:blank', '_blank');

                if (!newWin) {
                    alert("Pop-up geblokkeerd! Klik rechtsboven op 'Toestaan'.");
                    return;
                }

                newWin.document.write(`
                    <html>
                    <head>
                        <title>BrederoUnblocked</title>
                        <link rel="icon" type="image/x-icon" href="https://google.com">
                        <style>
                            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                            iframe { width: 100%; height: 100%; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${finalUrl}"></iframe>
                    </body>
                    </html>
                `);
                newWin.document.close();
            }
        }

        // TAB LOCKER voor de huidige pagina
        const lockedTitle = "BrederoUnblocked";
        setInterval(() => {
            if (document.title !== lockedTitle) document.title = lockedTitle;
        }, 100);

        document.getElementById('siteUrl').addEventListener("keypress", (e) => { if (e.key === "Enter") loadSite(); });
    </script>

</body>
</html>
