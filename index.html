<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrederoUnblocked</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="https://google.com">
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: #1a1a1a; color: white; font-family: sans-serif; 
        }
        .container { text-align: center; background: #333; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00d1ff; margin-bottom: 10px; }
        .url-input {
            width: 350px; padding: 15px; border-radius: 25px; border: 2px solid #444; 
            background: #222; color: white; font-size: 16px; outline: none;
        }
        .go-btn {
            margin-top: 25px; padding: 15px 40px; background: #00d1ff; color: black; 
            border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BrederoUnblocked</h1>
        <p>Voer een URL in om deze onzichtbaar te openen:</p>
        <input type="text" id="siteUrl" class="url-input" placeholder="bijv. youtube.com" autofocus>
        <br>
        <button class="go-btn" onclick="loadSite()">Launch Cloaked</button>
    </div>

    <script>
        function loadSite() {
            let input = document.getElementById('siteUrl').value.trim();
            let proxyUrl = "https://onrender.com"; 

            if (input) {
                let targetUrl = input;
                if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;
                let finalUrl = proxyUrl + targetUrl;

                // --- CLOAKING LOGIC ---
                // Dit opent een nieuw venster zonder adres (about:blank)
                var win = window.open();
                win.document.title = "BrederoUnblocked";
                
                // Zet de favicon vast in de nieuwe tab
                var link = win.document.createElement('link');
                link.rel = 'icon';
                link.href = 'https://google.com';
                win.document.head.appendChild(link);

                // Maak een iframe die de hele nieuwe tab vult
                var iframe = win.document.createElement('iframe');
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                iframe.style.margin = "0";
                iframe.style.border = "none";
                iframe.src = finalUrl;

                win.document.body.style.margin = "0";
                win.document.body.appendChild(iframe);
            }
        }

        document.getElementById('siteUrl').addEventListener("keypress", (e) => { if (e.key === "Enter") loadSite(); });
    </script>
</body>
</html>
